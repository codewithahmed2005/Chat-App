<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatApp - Connect with Friends</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <!-- Register Page -->
    <div id="register-page" class="container">
        <div class="card">
            <h2>📱 Create Account</h2>
            <div class="register-box">
                <input type="text" id="reg-username" placeholder="Username" autocomplete="off">
                <input type="text" id="reg-fullname" placeholder="Full Name">
                <div class="password-wrapper">
                    <input type="password" id="reg-password" placeholder="Password">
                    <span class="password-toggle" onclick="togglePassword('reg-password')">👁️</span>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="reg-confirm-password" placeholder="Confirm Password">
                    <span class="password-toggle" onclick="togglePassword('reg-confirm-password')">👁️</span>
                </div>
                <button onclick="register()">Register</button>
                <p id="reg-result" class="result-msg"></p>
                <hr>
                <p class="link-text">Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="container hidden">
        <div class="card">
            <h2>🔐 Login to ChatApp</h2>
            <div class="login-box">
                <input type="text" id="login-id" placeholder="Enter 10-digit User ID">
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Password">
                    <span class="password-toggle" onclick="togglePassword('login-password')">👁️</span>
                </div>
                <button onclick="login()">Login</button>
                <p id="login-result" class="result-msg"></p>
                <hr>
                <p class="link-text">Don't have an account? <a href="#" onclick="showRegister()">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Main App Section - Mobile WhatsApp Style -->
    <div id="app-section" class="hidden">
        <!-- Contacts Screen (visible by default on mobile) -->
        <div id="contacts-screen" class="contacts-screen">
            <div class="app-header">
                <div class="logo">
                    <h2>💬 ChatApp</h2>
                </div>
                <div class="user-info">
                    <button onclick="openProfileModal()" class="profile-btn">👤</button>
                    <button onclick="toggleDarkMode()" class="dark-mode-btn" id="dark-mode-btn">🌙</button>
                    <button onclick="logout()" class="logout-btn">🚪</button>
                </div>
            </div>

            <div class="search-section">
                <div class="search-input-group">
                    <input type="text" id="search-id" placeholder="Search by User ID">
                    <button onclick="searchUser()">🔍</button>
                </div>
                <div id="search-result" class="search-result hidden"></div>
            </div>

            <div id="requests-section" class="requests-section hidden">
                <h4>📨 Friend Requests</h4>
                <div id="requests-list" class="requests-list"></div>
            </div>

            <div class="friends-section">
                <div class="section-header">
                    <h4>Chats</h4>
                    <button onclick="refreshFriendsList()" class="refresh-btn">🔄</button>
                </div>
                <div id="friends-list" class="friends-list"></div>
            </div>
        </div>

        <!-- Chat Screen (hidden initially, opens when contact clicked) -->
        <div id="chat-screen" class="chat-screen hidden">
            <div class="chat-header">
                <button onclick="goBackToContacts()" class="back-btn">←</button>
                <div class="chat-with-info">
                    <div class="chat-avatar" id="chat-avatar">👤</div>
                    <h3 id="chat-with-name">Loading...</h3>
                </div>
                <div class="chat-actions">
                    <button onclick="showFileMenu()" class="attach-chat-btn">📎</button>
                </div>
            </div>
            
            <div class="messages-area" id="messages">
                <div class="welcome-message">💭 Send a message to start chatting</div>
            </div>
            
            <div class="typing-indicator hidden" id="typing-indicator">
                <span>✍️ typing...</span>
            </div>
            
            <div class="message-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" onkeyup="handleTyping()">
                <button onclick="sendPrivateMessage()">📤</button>
            </div>
            
            <div id="file-menu" class="file-menu hidden">
                <button onclick="sendFile('image')">🖼️ Image</button>
                <button onclick="sendFile('video')">🎥 Video</button>
                <button onclick="sendFile('audio')">🎵 Audio</button>
                <button onclick="sendFile('document')">📄 Document</button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <span class="close-modal" onclick="closeProfileModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="profile-pic-section">
                    <img id="profile-pic-preview" class="profile-pic-large" src="" alt="Profile Picture">
                    <div class="profile-pic-buttons">
                        <button onclick="uploadProfilePic()">📸 Upload</button>
                        <button onclick="removeProfilePic()" class="remove-btn">🗑️ Remove</button>
                    </div>
                    <input type="file" id="profile-pic-input" accept="image/*" style="display:none">
                </div>
                
                <div class="profile-info">
                    <div class="info-row">
                        <label>User ID</label>
                        <input type="text" id="profile-user-id" readonly disabled>
                    </div>
                    <div class="info-row">
                        <label>Username</label>
                        <input type="text" id="profile-username" placeholder="Username">
                    </div>
                    <div class="info-row">
                        <label>Full Name</label>
                        <input type="text" id="profile-fullname" placeholder="Full Name">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="saveProfile()" class="save-btn">💾 Save</button>
                <button onclick="closeProfileModal()" class="cancel-btn">Cancel</button>
            </div>
            <p id="profile-result" class="result-msg"></p>
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="reply-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reply</h3>
                <span class="close-modal" onclick="closeReplyModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="reply-original-msg" class="reply-original"></div>
                <textarea id="reply-input" placeholder="Type your reply..." rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="sendReply()" class="save-btn">📤 Send</button>
                <button onclick="closeReplyModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none">

    <script src="script.js"></script>
</body>
</html>
