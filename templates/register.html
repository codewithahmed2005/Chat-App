<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #128C7E; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #128C7E;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #128C7E; text-decoration: none; font-weight: 600; }
        .result { text-align: center; display: none; }
        .user-id {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            color: #128C7E;
            margin: 12px 0;
            letter-spacing: 2px;
        }
        #error { color: #e74c3c; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="formView">
            <h1>📱 Create Account</h1>
            <p class="subtitle">Get your unique Chat ID</p>
            <div id="error"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="displayName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="johndoe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit">Create Account</button>
            </form>
            <p class="link">Already have an account? <a href="/login">Login</a></p>
        </div>
        
        <div id="resultView" class="result">
            <div style="font-size: 48px; margin-bottom: 12px;">✅</div>
            <h3>Account Created!</h3>
            <p>Your Chat ID is:</p>
            <div class="user-id" id="userIdDisplay"></div>
            <p style="color: #666; font-size: 14px;">Share this ID with friends!</p>
            <a href="/login" style="display: inline-block; margin-top: 16px; padding: 12px 24px; background: #25D366; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Go to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    display_name: document.getElementById('displayName').value,
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            
            if (res.ok) {
                const data = await res.json();
                document.getElementById('formView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                document.getElementById('userIdDisplay').textContent = data.user_id;
            } else {
                const data = await res.json();
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = data.error;
            }
        });
    </script>
</body>
</html>
