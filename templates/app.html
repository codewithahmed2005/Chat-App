<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #128C7E;
            --primary-dark: #075E54;
            --secondary: #25D366;
            --bg: #E5DDD5;
            --chat-bg-pattern: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==');
            --sent: #DCF8C6;
            --received: #FFFFFF;
            --sidebar-bg: #FFFFFF;
            --header-bg: #EDEDED;
            --border: #E0E0E0;
            --text-secondary: #667781;
            --danger: #e74c3c;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #dadbd3;
        }

        /* ========== MAIN APP CONTAINER ========== */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            background: var(--sidebar-bg);
            position: relative;
            overflow: hidden;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .sidebar.hidden-mobile {
            transform: translateX(-100%);
        }

        /* Sidebar Header */
        .sidebar-header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-meta {
            min-width: 0;
            overflow: hidden;
        }

        .user-meta .name {
            font-weight: 600;
            font-size: 16px;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-meta .id {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-actions i {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions i:active {
            background: rgba(0,0,0,0.1);
        }

        /* Search */
        .search-container {
            padding: 8px 16px;
            background: #f6f6f6;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 20px;
            padding: 8px 16px;
            gap: 10px;
        }

        .search-box i {
            color: var(--text-secondary);
            font-size: 14px;
            flex-shrink: 0;
        }

        .search-box input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 15px;
            min-width: 0;
            background: transparent;
        }

        /* Add Contact Bar */
        .add-contact-bar {
            padding: 8px 16px;
            background: #f6f6f6;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .add-contact-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            min-width: 0;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .btn-icon:active {
            transform: scale(0.95);
        }

        /* Contacts List */
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background: white;
            -webkit-overflow-scrolling: touch;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            min-height: 72px;
        }

        .contact-item:active {
            background: #f5f5f5;
        }

        .contact-item.active {
            background: #f0f0f0;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #555;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .contact-details {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            gap: 8px;
        }

        .contact-name {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .contact-time {
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .contact-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .last-message {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .unread-badge {
            background: var(--secondary);
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        /* ========== CHAT AREA ========== */
        .chat-area {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .chat-area.active {
            transform: translateX(0);
        }

        /* Chat Header */
        .chat-header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .back-btn {
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .back-btn:active {
            background: rgba(0,0,0,0.1);
        }

        .chat-user-info {
            min-width: 0;
            overflow: hidden;
        }

        .chat-user-info .name {
            font-weight: 600;
            font-size: 16px;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-user-info .status {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 18px;
        }

        /* Messages Container */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            background-image: var(--chat-bg-pattern);
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        /* Message Bubble */
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
            word-wrap: break-word;
            font-size: 14.2px;
            line-height: 1.4;
            animation: messageSlide 0.25s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--sent);
            border-bottom-right-radius: 2px;
            margin-left: 15%;
        }

        .message.received {
            align-self: flex-start;
            background: var(--received);
            border-bottom-left-radius: 2px;
            margin-right: 15%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .message.deleted {
            opacity: 0.6;
            font-style: italic;
        }

        .message.deleted .message-content {
            color: #999;
        }

        /* Reply Preview */
        .message-reply {
            background: rgba(0,0,0,0.05);
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--primary);
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .message-content {
            word-break: break-word;
            hyphens: auto;
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
        }

        .message-edited {
            font-size: 11px;
            color: #999;
            font-style: italic;
            white-space: nowrap;
        }

        .message-status {
            font-size: 14px;
            color: #999;
            line-height: 1;
        }

        .message-status.read {
            color: #53bdeb;
        }

        /* Message Actions */
        .message-actions {
            position: absolute;
            top: -32px;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: none;
            z-index: 100;
            overflow: hidden;
            flex-direction: row;
            white-space: nowrap;
        }

        .message.sent .message-actions {
            right: auto;
            left: 0;
        }

        .message:hover .message-actions,
        .message:active .message-actions {
            display: flex;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: #f0f0f0;
        }

        .action-btn.delete {
            color: var(--danger);
        }

        /* Reply Banner */
        .reply-banner {
            background: white;
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: none;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .reply-banner.active {
            display: flex;
        }

        .reply-content {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .reply-close {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            flex-shrink: 0;
        }

        /* Input Area */
        .input-area {
            padding: 10px 16px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 15px;
            min-width: 0;
            background: transparent;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .btn-send:active {
            transform: scale(0.9);
        }

        /* Empty States */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #ddd;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #666;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Typing Indicator */
        .typing-indicator {
            font-size: 13px;
            color: var(--secondary);
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            animation: modalSlide 0.2s ease;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
        }

        .modal input:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: white;
        }

        .modal-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* ========== DESKTOP STYLES ========== */
        @media (min-width: 768px) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background: #dadbd3;
                padding: 20px;
            }

            .app-container {
                width: 95%;
                max-width: 1400px;
                height: 95vh;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 2px 16px rgba(0,0,0,0.15);
                position: relative;
            }

            .sidebar {
                position: relative;
                width: 360px;
                transform: none !important;
                border-right: 1px solid var(--border);
            }

            .sidebar.hidden-mobile {
                transform: none !important;
            }

            .chat-area {
                position: relative;
                transform: none;
                flex: 1;
                display: none;
            }

            .chat-area.active {
                transform: none;
                display: flex;
            }

            .back-btn {
                display: none !important;
            }

            .message {
                max-width: 65%;
            }

            .message-actions {
                display: none !important;
            }

            .message:hover .message-actions {
                display: flex !important;
            }
        }

        /* Mobile landscape fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .sidebar-header, .chat-header {
                min-height: 50px;
                padding: 8px 12px;
            }

            .avatar {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .contact-avatar {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }

            .input-area {
                padding: 8px 12px;
            }
        }

        /* iPhone safe area */
        @supports (padding-top: env(safe-area-inset-top)) {
            .sidebar-header, .chat-header {
                padding-top: max(10px, env(safe-area-inset-top));
            }

            .input-area {
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="myAvatar">M</div>
                    <div class="user-meta">
                        <div class="name" id="myName">Me</div>
                        <div class="id" id="myId">ID: ...</div>
                    </div>
                </div>
                <div class="header-actions">
                    <i class="fas fa-user-plus" onclick="showAddContact()"></i>
                    <i class="fas fa-ellipsis-v" onclick="logout()"></i>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search or start new chat" id="searchInput" oninput="filterContacts()">
                </div>
            </div>

            <div class="add-contact-bar" id="addContactBar" style="display: none;">
                <input type="text" id="contactIdInput" placeholder="Enter 10-digit ID" maxlength="10">
                <button class="btn-icon" onclick="addContact()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="contacts-list" id="contactsList">
                <div class="empty-state" style="height: auto;">
                    <i class="fas fa-comments"></i>
                    <p>No contacts yet</p>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area" id
