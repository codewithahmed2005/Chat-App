{% extends "base.html" %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="chat-layout">
    <!-- Sidebar (same as dashboard) -->
    <div class="sidebar">
        <div class="user-header">
            <div class="avatar">👤</div>
            <div class="user-info">
                <h3 id="myName">Me</h3>
                <p class="user-id" id="myId">ID: ...</p>
            </div>
            <button onclick="window.location.href='/dashboard'" class="btn-icon">←</button>
        </div>
        <div class="contacts-list" id="contactsList"></div>
    </div>
    
    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-user-info">
                <div class="avatar" id="contactAvatar">👤</div>
                <div>
                    <h3 id="contactName">Loading...</h3>
                    <p class="status" id="typingStatus"></p>
                </div>
            </div>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div class="loading">Loading messages...</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()" class="btn-send">➤</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const contactUserId = "{{ contact_user_id }}";
let socket = null;
let currentUser = null;
let contactInfo = null;

// Initialize
async function init() {
    // Get current user
    const meRes = await fetch('/api/me');
    if (!meRes.ok) {
        window.location.href = '/login';
        return;
    }
    currentUser = await meRes.json();
    document.getElementById('myName').textContent = currentUser.display_name;
    document.getElementById('myId').textContent = `ID: ${currentUser.user_id}`;
    
    // Load contacts sidebar
    loadContacts();
    
    // Load contact info and messages
    await loadContactInfo();
    await loadMessages();
    
    // Connect WebSocket
    connectSocket();
}

async function loadContacts() {
    const res = await fetch('/api/contacts');
    const contacts = await res.json();
    const list = document.getElementById('contactsList');
    
    list.innerHTML = contacts.map(c => `
        <div class="contact-item ${c.user_id === contactUserId ? 'active' : ''}" 
             onclick="window.location.href='/chat/${c.user_id}'">
            <div class="contact-avatar">${c.display_name[0].toUpperCase()}</div>
            <div class="contact-info">
                <h4>${c.display_name}</h4>
                <p>@${c.username}</p>
            </div>
        </div>
    `).join('');
}

async function loadContactInfo() {
    // We need to get contact info from the contacts list
    const res = await fetch('/api/contacts');
    const contacts = await res.json();
    contactInfo = contacts.find(c => c.user_id === contactUserId);
    
    if (contactInfo) {
        document.getElementById('contactName').textContent = contactInfo.display_name;
        document.getElementById('contactAvatar').textContent = contactInfo.display_name[0].toUpperCase();
    }
}

async function loadMessages() {
    const res = await fetch(`/api/messages/${contactUserId}`);
    const messages = await res.json();
    renderMessages(messages);
}

function renderMessages(messages) {
    const container = document.getElementById('messagesContainer');
    
    if (messages.length === 0) {
        container.innerHTML = '<div class="empty-chat">No messages yet. Say hello! 👋</div>';
        return;
    }
    
    container.innerHTML = messages.map(m => `
        <div class="message ${m.is_mine ? 'sent' : 'received'}">
            <div class="message-content">${escapeHtml(m.content)}</div>
            <div class="message-time">${formatTime(m.timestamp)}</div>
        </div>
    `).join('');
    
    scrollToBottom();
}

function connectSocket() {
    socket = io();
    
    socket.on('connect', () => {
        console.log('Connected to server');
    });
    
    socket.on('new_message', (data) => {
        if (data.sender_id === contactUserId) {
            appendMessage(data.content, false, data.timestamp);
        }
    });
    
    socket.on('message_sent', (data) => {
        appendMessage(data.content, true, data.timestamp);
    });
    
    socket.on('user_typing', (data) => {
        if (data.user_id === contactUserId) {
            document.getElementById('typingStatus').textContent = `${data.display_name} is typing...`;
            setTimeout(() => {
                document.getElementById('typingStatus').textContent = '';
            }, 2000);
        }
    });
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content || !socket) return;
    
    socket.emit('send_message', {
        receiver_id: contactUserId,
        content: content
    });
    
    input.value = '';
}

function appendMessage(content, isMine, timestamp) {
    const container = document.getElementById('messagesContainer');
    
    // Remove empty state if exists
    if (container.querySelector('.empty-chat')) {
        container.innerHTML = '';
    }
    
    const div = document.createElement('div');
    div.className = `message ${isMine ? 'sent' : 'received'}`;
    div.innerHTML = `
        <div class="message-content">${escapeHtml(content)}</div>
        <div class="message-time">${formatTime(timestamp || new Date())}</div>
    `;
    
    container.appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    const container = document.getElementById('messagesContainer');
    container.scrollTop = container.scrollHeight;
}

// Typing indicator
let typingTimer;
document.getElementById('messageInput').addEventListener('input', () => {
    if (socket) {
        clearTimeout(typingTimer);
        socket.emit('typing', {receiver_id: contactUserId});
        typingTimer = setTimeout(() => {}, 1000);
    }
});

// Enter key to send
document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(isoString) {
    const date = new Date(isoString);
    return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

init();
</script>
{% endblock %}
